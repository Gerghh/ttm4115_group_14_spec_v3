<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Readiness Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }

    #refresh-info { font-size: 0.8rem; color: #64748b; }

    .actions { display: flex; gap: 0.75rem; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-diag    { background: #8b5cf6; color: #fff; font-size: 0.75rem; padding: 0.3rem 0.7rem; }

    #drone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .drone-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.25rem;
      border-left: 4px solid #475569;
      transition: border-color 0.3s;
    }

    .drone-card.READY        { border-color: #22c55e; }
    .drone-card.CHARGING     { border-color: #3b82f6; }
    .drone-card.MAINTENANCE  { border-color: #f59e0b; }
    .drone-card.ERROR        { border-color: #ef4444; }
    .drone-card.OFFLINE      { border-color: #64748b; }
    .drone-card.DIAGNOSTIC   { border-color: #a78bfa; }
    .drone-card.IDLE         { border-color: #475569; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .drone-name { font-size: 1.05rem; font-weight: 700; }
    .drone-facility { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .badge-READY       { background: #166534; color: #86efac; }
    .badge-CHARGING    { background: #1e3a5f; color: #93c5fd; }
    .badge-MAINTENANCE { background: #78350f; color: #fcd34d; }
    .badge-ERROR       { background: #7f1d1d; color: #fca5a5; }
    .badge-OFFLINE     { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
    .badge-DIAGNOSTIC  { background: #3b0764; color: #c4b5fd; }
    .badge-IDLE        { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .metric { background: #0f172a; border-radius: 8px; padding: 0.6rem 0.75rem; }
    .metric-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-size: 1rem; font-weight: 700; margin-top: 2px; }

    .battery-bar-wrap {
      background: #0f172a;
      border-radius: 4px;
      height: 6px;
      margin-top: 6px;
      overflow: hidden;
    }
    .battery-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }

    .checks { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }

    .check-pill {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }
    .check-ok   { background: #14532d; color: #86efac; }
    .check-fail { background: #7f1d1d; color: #fca5a5; }

    .error-msg {
      font-size: 0.75rem;
      color: #fca5a5;
      background: #450a0a;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      word-break: break-word;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .last-check { font-size: 0.7rem; color: #64748b; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      max-width: 320px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 999;
    }
    #toast.show { opacity: 1; pointer-events: auto; }
    #toast.success { border-color: #22c55e; color: #86efac; }
    #toast.error   { border-color: #ef4444; color: #fca5a5; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #a78bfa;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Drone Readiness Dashboard</h1>
      <div class="subtitle">Real-time availability monitoring via Pi agent diagnostics</div>
    </div>
    <div>
      <div id="refresh-info">Auto-refresh every 10 s</div>
      <div class="actions" style="margin-top:0.5rem">
        <button class="btn-primary" onclick="loadDrones()">Refresh</button>
        <button class="btn-danger" onclick="reseed()">Reset Demo Data</button>
      </div>
    </div>
  </header>

  <div id="drone-grid"><p style="color:#64748b">Loading drones…</p></div>

  <div id="toast"></div>

  <script>
    const API = '';  // empty = same origin; change to e.g. 'http://localhost:8000' if needed

    async function loadDrones() {
      try {
        const res = await fetch(`${API}/drones`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const drones = await res.json();
        renderGrid(drones);
      } catch (e) {
        document.getElementById('drone-grid').innerHTML =
          `<p style="color:#ef4444">Failed to load drones: ${e.message}</p>`;
      }
    }

    function renderGrid(drones) {
      const grid = document.getElementById('drone-grid');
      if (!drones.length) {
        grid.innerHTML = '<p style="color:#64748b">No drones registered.</p>';
        return;
      }
      grid.innerHTML = drones.map(renderCard).join('');
    }

    function renderCard(d) {
      const batteryColor = d.battery_percent >= 60 ? '#22c55e'
                         : d.battery_percent >= 30 ? '#f59e0b' : '#ef4444';
      const lastCheck = d.last_check_at
        ? new Date(d.last_check_at).toLocaleString()
        : 'Never';

      const checks = [
        { label: 'Rotor',  ok: d.rotor_ok },
        { label: 'Sensors', ok: d.sensors_ok },
        { label: 'Comms',  ok: d.communication_ok },
      ];

      return `
        <div class="drone-card ${d.status}" id="card-${d.id}">
          <div class="card-header">
            <div>
              <div class="drone-name">${d.name}</div>
              <div class="drone-facility">${d.facility_name} · pi:${d.raspberry_pi_id}</div>
            </div>
            <span class="status-badge badge-${d.status}">${d.status}</span>
          </div>

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">Battery</div>
              <div class="metric-value" style="color:${batteryColor}">${d.battery_percent.toFixed(1)}%</div>
              <div class="battery-bar-wrap">
                <div class="battery-bar" style="width:${d.battery_percent}%;background:${batteryColor}"></div>
              </div>
            </div>
            <div class="metric">
              <div class="metric-label">Max payload</div>
              <div class="metric-value">${d.max_payload_kg} kg</div>
            </div>
          </div>

          <div class="checks">
            ${checks.map(c =>
              `<span class="check-pill ${c.ok ? 'check-ok' : 'check-fail'}">${c.ok ? '✓' : '✗'} ${c.label}</span>`
            ).join('')}
          </div>

          ${d.last_error_message ? `<div class="error-msg">${d.last_error_message}</div>` : ''}

          <div class="card-footer">
            <div class="last-check">Last check: ${lastCheck}</div>
            <button class="btn-diag" onclick="runDiagnostic(${d.id}, this)">
              Run Diagnostic
            </button>
          </div>
        </div>
      `;
    }

    async function runDiagnostic(droneId, btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Checking…';

      // Optimistically show DIAGNOSTIC state on the card
      const card = document.getElementById(`card-${droneId}`);
      if (card) {
        card.className = `drone-card DIAGNOSTIC`;
        card.querySelector('.status-badge').textContent = 'DIAGNOSTIC';
        card.querySelector('.status-badge').className = 'status-badge badge-DIAGNOSTIC';
      }

      try {
        const res = await fetch(`${API}/drones/${droneId}/diagnostic`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        showToast(`${data.computed_status}: ${data.message}`, 'success');
        await loadDrones();
      } catch (e) {
        showToast(`Diagnostic failed: ${e.message}`, 'error');
        await loadDrones();
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Run Diagnostic';
      }
    }

    async function reseed() {
      if (!confirm('Reset all drone data to demo defaults?')) return;
      try {
        const res = await fetch(`${API}/seed`, { method: 'POST' });
        const data = await res.json();
        showToast(data.message, 'success');
        await loadDrones();
      } catch (e) {
        showToast(`Reseed failed: ${e.message}`, 'error');
      }
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = ''; }, 4000);
    }

    // Initial load + auto-refresh every 10 s
    loadDrones();
    setInterval(loadDrones, 10_000);
  </script>
</body>
</html>
